name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: actions/setup-go@v5
        with:
          go-version-file: native/mobilecore/go.mod
          cache: true
          cache-dependency-path: native/mobilecore/go.*

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Build and test native mobilecore
        run: scripts/build_mobilecore.sh
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
          FORCE_NATIVE_REBUILD: "1"
          MOBILECORE_TARGET: android

      - name: Verify official olcRTC dependency graph
        working-directory: native/mobilecore
        shell: bash
        run: |
          set -euo pipefail
          go list -m all | tee module-graph.txt
          grep -F "github.com/openlibrecommunity/olcrtc v0.0.0-20260713124136-42ae4e0c6a1a" module-graph.txt
          if grep -E "github.com/Oleglog/(Olcrtc_manager|j)( |$)" module-graph.txt; then
            echo "legacy fork replacement remains in the module graph" >&2
            exit 1
          fi

      - name: Upload resolved Go module files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobilecore-module-files-${{ github.run_id }}
          path: |
            native/mobilecore/go.mod
            native/mobilecore/go.sum
            native/mobilecore/module-graph.txt
          if-no-files-found: warn

      - name: Build HEV tunnel
        run: scripts/build_hev.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
          FORCE_NATIVE_REBUILD: "1"
          HEV_APP_ABI: armeabi-v7a arm64-v8a x86_64

      - name: Run Android unit tests, lint and assemble test APKs
        run: >
          ./gradlew --no-daemon --build-cache
          :app:testDebugUnitTest
          :app:lintDebug
          :app:assembleDebug
          :app:assembleDebugAndroidTest

      - name: Run Android instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          disable-animations: true
          script: ./gradlew --no-daemon --build-cache :app:connectedDebugAndroidTest

      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports-${{ github.run_id }}
          path: |
            app/build/reports/
            app/build/outputs/androidTest-results/
          if-no-files-found: warn
