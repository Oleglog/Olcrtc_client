name: Android

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          cache: false
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"
      - run: python scripts/verify_licenses.py
      - run: scripts/build_mobilecore.sh
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
      - run: scripts/build_hev.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
      - run: test -f app/libs/mobilecore.aar && test -f app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so && test -f app/src/main/jniLibs/armeabi-v7a/libhev-socks5-tunnel.so && test -f app/src/main/jniLibs/x86_64/libhev-socks5-tunnel.so
      - run: ./gradlew --no-daemon lintDebug testDebugUnitTest assembleDebug assembleRelease
      - run: ./gradlew --no-daemon :app:assembleDebugAndroidTest
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          script: ./gradlew --no-daemon connectedDebugAndroidTest
      - uses: actions/upload-artifact@v4
        with:
          name: olcrtc-client-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
