name: Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.0.0
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_SIGNING_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          cache: false

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Prepare release signing
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || { echo "ANDROID_KEYSTORE_BASE64 secret is required" >&2; exit 1; }
          test -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" || { echo "ANDROID_KEYSTORE_PASSWORD secret is required" >&2; exit 1; }
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}" || { echo "ANDROID_KEY_ALIAS secret is required" >&2; exit 1; }
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}" || { echo "ANDROID_KEY_PASSWORD secret is required" >&2; exit 1; }
          mkdir -p keystore
          printf '%s' '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 -d > keystore/olcrtc-release.jks
          cat > keystore.properties <<EOF
          storeFile=keystore/olcrtc-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build native mobilecore
        run: scripts/build_mobilecore.sh
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358

      - name: Build HEV tunnel
        run: scripts/build_hev.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358

      - name: Assemble signed release APK
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk "release-artifacts/olcRTC-Client-${TAG}.apk"
          (cd release-artifacts && sha256sum "olcRTC-Client-${TAG}.apk" > SHA256SUMS.txt)
          cat release-artifacts/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: olcrtc-client-release-apk
          path: release-artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: olcRTC Client ${{ github.event.inputs.tag || github.ref_name }}
          files: release-artifacts/*
          generate_release_notes: true
