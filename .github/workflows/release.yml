name: Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.0.0
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_SIGNING_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify successful CI for release commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          successful_runs="$(gh run list --workflow ci.yml --commit "$GITHUB_SHA" --status success --limit 1 --json databaseId --jq 'length')"
          test "$successful_runs" -eq 1 || { echo "A successful CI run for $GITHUB_SHA is required" >&2; exit 1; }

      - name: Restore mobilecore build cache
        id: mobilecore-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/bin/gomobile
            app/libs/mobilecore.aar
          key: mobilecore-${{ runner.os }}-android-all-${{ hashFiles('scripts/build_mobilecore.sh', 'native/mobilecore/go.mod', 'native/mobilecore/go.sum', 'native/mobilecore/**/*.go') }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: actions/setup-go@v5
        with:
          go-version-file: native/mobilecore/go.mod
          cache: true
          cache-dependency-path: native/mobilecore/go.*

      - name: Restore HEV native cache
        uses: actions/cache/restore@v4
        with:
          path: |
            app/src/main/jniLibs
            native/hev-socks5-tunnel/upstream
          key: hev-${{ runner.os }}-ndk-28.2.13676358-${{ hashFiles('scripts/build_hev.sh', 'app/src/main/jni/**') }}

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Prepare release signing
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || { echo "ANDROID_KEYSTORE_BASE64 secret is required" >&2; exit 1; }
          test -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" || { echo "ANDROID_KEYSTORE_PASSWORD secret is required" >&2; exit 1; }
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}" || { echo "ANDROID_KEY_ALIAS secret is required" >&2; exit 1; }
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}" || { echo "ANDROID_KEY_PASSWORD secret is required" >&2; exit 1; }
          mkdir -p keystore
          printf '%s' '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 -d > keystore/olcrtc-release.jks
          cat > keystore.properties <<EOF
          storeFile=keystore/olcrtc-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build native mobilecore
        run: scripts/build_mobilecore.sh
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
          FORCE_NATIVE_REBUILD: "1"
          MOBILECORE_TARGET: android

      - name: Verify mobilecore AAR dependency metadata
        run: scripts/verify_mobilecore_artifact.sh

      - name: Save mobilecore AAR cache
        if: steps.mobilecore-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/go/bin/gomobile
            app/libs/mobilecore.aar
          key: ${{ steps.mobilecore-cache.outputs.cache-primary-key }}

      - name: Build HEV tunnel
        run: scripts/build_hev.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
          HEV_APP_ABI: armeabi-v7a arm64-v8a

      - name: Assemble signed release APK
        run: ./gradlew --no-daemon --build-cache :app:assembleRelease

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-arm64-v8a-release.apk "release-artifacts/olcRTC-Client-${TAG}-arm64-v8a.apk"
          cp app/build/outputs/apk/release/app-armeabi-v7a-release.apk "release-artifacts/olcRTC-Client-${TAG}-armeabi-v7a.apk"
          cp app/build/outputs/apk/release/app-universal-release.apk "release-artifacts/olcRTC-Client-${TAG}-universal.apk"
          (cd release-artifacts && sha256sum *.apk > SHA256SUMS.txt)
          cat release-artifacts/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: olcrtc-client-release-apk
          path: release-artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: olcRTC Client ${{ github.event.inputs.tag || github.ref_name }}
          files: release-artifacts/*
          generate_release_notes: true

      - name: Keep latest five GitHub Releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq 'map(select(.draft == false)) | sort_by(.published_at) | reverse | .[5:][]?.id' |
          while read -r release_id; do
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          done
